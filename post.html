<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Post</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Blog Post</h1>
    <nav>
        <a href="index.html">Back to Home</a>
    </nav>
</header>

<main>
    <section id="post-details">
        <h2>Post Details</h2>
        <div id="post-content"></div>
    </section>

    <section id="edit-post-section">
        <h2>Edit Post</h2>

        <form id="edit-post-form">
            <label for="edit-title">Post Title:</label>
            <input type="text" id="edit-title" name="edit-title" required>

            <label for="edit-content">Post Content:</label>
            <textarea id="edit-content" name="edit-content" rows="6" required></textarea>

            <button type="submit">Save Changes</button>
            <button type="button" id="delete-post">Delete Post</button>
        </form>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
